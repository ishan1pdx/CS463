<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercise 01 - Audit</title>
  </head>
  <body>
    <main>
      <h1>Payment Form</h1>

      <form>
        <div>
          <label for="name">Name:</label><br />
          <input type="text" id="name" name="name" />
        </div>

        <br />

        <div>
          <label for="address">Address:</label><br />
          <input type="text" id="address" name="address" />
        </div>

        <br />

        <div>
          <label for="city">City:</label><br />
          <input type="text" id="city" name="city" />
        </div>

        <br />

        <div>
          <label for="zip">Zip Code:</label><br />
          <input type="text" id="zip" name="zip" inputmode="numeric" />
        </div>

        <br />

        <fieldset>
          <legend>Credit Card Type:</legend>

          <input type="radio" id="visa" name="card" value="visa" />
          <label for="visa">Visa</label><br />

          <input type="radio" id="mastercard" name="card" value="mastercard" />
          <label for="mastercard">MasterCard</label><br />

          <input type="radio" id="amex" name="card" value="amex" />
          <label for="amex">American Express</label>
        </fieldset>

        <br />

        <div>
          <label for="cc-number">Credit Card Number:</label><br />
          <input type="text" id="cc-number" name="cc_number" inputmode="numeric" />
        </div>

        <br />

        <div>
          <label for="cvv">CVC:</label><br />
          <input type="text" id="cvv" name="cvv" inputmode="numeric" />
        </div>

        <br />

        <input type="submit" value="Submit" />
      </form>
    </main>
  </body>
</html>
