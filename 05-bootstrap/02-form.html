<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bootstrap Exercise 02 - Form</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </head>
  <body class="bg-light">
    <main class="container py-5">
      <section class="card shadow-sm mx-auto" style="max-width: 400px">
        <div class="card-body">
          <h1 class="text-center mb-4 fs-4">Roth IRA Calculator</h1>

          <form>
            <div class="row mb-3 align-items-center">
              <label for="balance" class="col-12 col-md-6 col-form-label">
                Balance ($)
              </label>
              <div class="col-12 col-md-6">
                <input
                  type="number"
                  class="form-control"
                  id="balance"
                  name="balance"
                />
              </div>
            </div>

            <div class="row mb-3 align-items-center">
              <label
                for="annual-contribution"
                class="col-12 col-md-6 col-form-label"
              >
                Annual Contribution ($)
              </label>
              <div class="col-12 col-md-6">
                <input
                  type="number"
                  class="form-control"
                  id="annual-contribution"
                  name="annual-contribution"
                />
              </div>
            </div>

            <fieldset class="row mb-3">
              <legend class="col-form-label col-12 col-md-6 pt-0">
                Maximize contributions?
              </legend>
              <div class="col-12 col-md-6">
                <div class="form-check form-check-inline">
                  <input
                    class="form-check-input"
                    type="radio"
                    name="maximize"
                    id="maximize-yes"
                    value="yes"
                  />
                  <label class="form-check-label" for="maximize-yes">
                    Yes
                  </label>
                </div>

                <div class="form-check form-check-inline">
                  <input
                    class="form-check-input"
                    type="radio"
                    name="maximize"
                    id="maximize-no"
                    value="no"
                  />
                  <label class="form-check-label" for="maximize-no"> No </label>
                </div>
              </div>
            </fieldset>

            <div class="row mb-3 align-items-center">
              <label
                for="expected-return"
                class="col-12 col-md-6 col-form-label"
              >
                Expected return (%)
              </label>
              <div class="col-12 col-md-6">
                <input
                  type="number"
                  class="form-control"
                  id="expected-return"
                  name="expected-return"
                  step="0.01"
                />
              </div>
            </div>

            <div class="row mb-3 align-items-center">
              <label for="current-age" class="col-12 col-md-6 col-form-label">
                Current age
              </label>
              <div class="col-12 col-md-6">
                <input
                  type="number"
                  class="form-control"
                  id="current-age"
                  name="current-age"
                />
              </div>
            </div>

            <div class="row mb-3 align-items-center">
              <label
                for="retirement-age"
                class="col-12 col-md-6 col-form-label"
              >
                Retirement age
              </label>
              <div class="col-12 col-md-6">
                <input
                  type="number"
                  class="form-control"
                  id="retirement-age"
                  name="retirement-age"
                />
              </div>
            </div>

            <div class="row mb-3 align-items-center">
              <label for="tax-rate" class="col-12 col-md-6 col-form-label">
                Tax rate (%)
              </label>
              <div class="col-12 col-md-6">
                <input
                  type="number"
                  class="form-control"
                  id="tax-rate"
                  name="tax-rate"
                  step="0.01"
                />
              </div>
            </div>

            <div class="row mb-3">
              <div class="col-6">
                <button type="submit" class="btn btn-primary w-100">
                  Calculate
                </button>
              </div>
              <div class="col-6">
                <button type="reset" class="btn btn-light border w-100">
                  Reset
                </button>
              </div>
            </div>

            <p class="small mb-0">
              This exercise is a simplified version of the Roth IRA Calculator
              at
              <a href="https://www.calculator.net/roth-ira-calculator.html">
                Calculator.net
              </a>
            </p>
          </form>
        </div>
      </section>
    </main>
  </body>
</html>
